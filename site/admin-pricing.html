<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>DHI vs. Market — pricing (internal)</title>
  <link rel="stylesheet" href="assets/tailwind.css" />
  <style>body{font-family:Inter,system-ui,sans-serif}.in{width:100%;border-radius:.5rem;border:1px solid #cbd5e1;padding:.5rem .65rem;font-size:.9rem}</style>
</head>
<body class="bg-slate-50 text-slate-700 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-8">
    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <a href="admin.html" class="text-xs font-semibold text-cyan-700 hover:underline">&larr; Leads admin</a>
        <h1 class="mt-1 font-display text-2xl font-extrabold text-brand-900">DHI vs. Market — supply pricing</h1>
        <p class="text-sm text-slate-500">Internal. Built from the anonymized price index captured by Supply Spend Check.</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="secret" type="password" class="in !w-56" placeholder="Admin key" />
        <button id="load" class="rounded-lg bg-brand-900 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-800">Load</button>
        <button id="clear" class="rounded-lg border border-rose-300 px-3 py-2 text-sm font-semibold text-rose-700 hover:bg-rose-50">Clear demo data</button>
      </div>
    </div>
    <p id="status" class="mt-3 text-sm text-slate-500"></p>
    <div id="summary" class="mt-4 hidden grid gap-4 sm:grid-cols-4"></div>
    <div id="report" class="mt-6 space-y-8"></div>
  </div>
  <script src="assets/admin-pricing.js"></script>
</body>
</html>
