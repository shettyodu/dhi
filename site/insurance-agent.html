<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Agent Console — DHI Insurance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/tailwind.css" />
  <style>
    body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9}
    :root{--ink:#0f2740;--accent:#1c6cb0}
    .navbtn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;font-size:14px;font-weight:600;color:#475569;cursor:pointer;text-align:left}
    .navbtn:hover{background:#f1f5f9;color:var(--ink)}
    .navbtn[data-on="1"]{background:var(--accent);color:#fff}
    .kpi{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px}
    .kpi .n{font-size:26px;font-weight:800;color:var(--ink);line-height:1.1}
    .kpi .l{font-size:12px;color:#64748b;margin-top:3px}
    table{width:100%;border-collapse:collapse}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:left;padding:8px 10px;border-bottom:1px solid #e2e8f0}
    td{font-size:13px;color:#334155;padding:9px 10px;border-bottom:1px solid #f1f5f9}
    .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px}
    .inp{border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 11px;font-size:14px;width:100%}
    .inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(28,108,176,.14)}
    .btn{background:var(--ink);color:#fff;font-weight:700;font-size:14px;border-radius:9px;padding:10px 16px}
    .btn:hover{filter:brightness(1.12)}
    .btn-a{background:var(--accent)}
    .sample{background:#fffbeb;color:#92400e;border:1px solid #fde68a;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
    /* nav visibility (own CSS — don't rely on purged tailwind responsive utils) */
    .sidebar{display:none;width:13rem;flex:none}
    .botnav{display:flex}
    @media(min-width:1024px){.sidebar{display:block}.botnav{display:none}}
  </style>
</head>
<body class="text-slate-700 antialiased">
  <!-- top bar -->
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
      <div class="flex items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center rounded-lg text-sm font-extrabold text-white" style="background:var(--ink)">DHI</span>
        <div><p class="text-sm font-bold" style="color:var(--ink)">Insurance · Agent Console</p><p class="text-[11px] text-slate-400">Book · leads · census · contracts</p></div>
      </div>
      <div class="flex items-center gap-2">
        <span id="mode-pill" class="sample" title="Preview mode">PREVIEW · sample data</span>
        <select id="agent-switch" class="inp" style="width:auto;padding:7px 10px"></select>
        <button id="auth-btn" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Sign in</button>
        <a href="insurance.html" class="hidden rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50 sm:inline">&larr; DHI site</a>
      </div>
    </div>
  </header>

  <div class="mx-auto flex max-w-7xl gap-6 px-4 py-6 sm:px-6">
    <!-- sidebar toolbar -->
    <aside class="sidebar">
      <nav id="nav" class="card space-y-1 p-2"></nav>
      <div class="card mt-4 p-3">
        <p class="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Your mirror link</p>
        <p id="mini-link" class="mt-1 break-all text-[11px] text-slate-500"></p>
        <button id="mini-copy" class="btn btn-a mt-2 w-full text-xs">Copy link</button>
      </div>
    </aside>
    <main id="view" class="min-w-0 flex-1"></main>
  </div>

  <!-- mobile nav -->
  <div class="botnav fixed bottom-0 left-0 right-0 z-40 border-t border-slate-200 bg-white">
    <div id="nav-m" class="mx-auto flex max-w-7xl gap-1 overflow-x-auto px-2 py-1.5"></div>
  </div>

  <!-- sign-in modal -->
  <div id="signin-ov" style="display:none;position:fixed;inset:0;z-index:80;align-items:center;justify-content:center;padding:16px;background:rgba(15,23,42,.5)">
    <div class="card" style="max-width:380px;width:100%">
      <div class="p-5" style="background:var(--ink);color:#fff;border-radius:14px 14px 0 0">
        <p class="text-sm font-bold">Agent sign-in</p>
        <p class="text-xs" style="color:#9fc4e8">See your live leads &amp; book.</p>
      </div>
      <form id="signin-form" class="p-5 space-y-3">
        <input class="inp" id="si-code" placeholder="Agent code" autocomplete="username" required />
        <input class="inp" id="si-pass" type="password" placeholder="Password" autocomplete="current-password" required />
        <div class="flex gap-2 pt-1">
          <button type="button" id="si-cancel" class="flex-1 rounded-lg border border-slate-300 px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50">Cancel</button>
          <button type="submit" class="btn btn-a flex-1" id="si-go">Sign in</button>
        </div>
        <p class="text-xs" id="si-note"></p>
      </form>
    </div>
  </div>

  <script src="assets/insurance-agents.js"></script>
  <script src="assets/insurance-agent.js?v=3"></script>
</body>
</html>
