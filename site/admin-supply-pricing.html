<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Supply pricing (internal) — DHI</title>
  <link rel="stylesheet" href="assets/tailwind.css" />
  <style>body{font-family:Inter,system-ui,sans-serif}.in{border-radius:.4rem;border:1px solid #cbd5e1;padding:.35rem .5rem;font-size:.85rem}.cell{width:5.5rem}</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-8">
    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <a href="admin.html" class="text-xs font-semibold text-cyan-700 hover:underline">&larr; Leads admin</a>
        <h1 class="mt-1 font-display text-2xl font-extrabold text-brand-900">Supply pricing — cost, sell &amp; margin</h1>
        <p class="text-sm text-slate-500">Internal. Set manufacturer cost and DHI sell price per item; the storefront shows the sell price. "Mkt" = median others pay (from the price index).</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="secret" type="password" class="in" placeholder="Admin key" />
        <button id="load" class="rounded-lg bg-brand-900 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-800">Load</button>
      </div>
    </div>
    <div class="mt-3 flex flex-wrap items-center gap-3">
      <input id="q" class="in" placeholder="Filter items…" />
      <button id="suggest" class="rounded-lg border border-cyan-300 px-3 py-1.5 text-sm font-semibold text-cyan-700 hover:bg-cyan-50">Suggest sell = 3% under market</button>
      <button id="save" class="rounded-lg bg-emerald-600 px-4 py-1.5 text-sm font-semibold text-white hover:bg-emerald-700">Save changes</button>
      <span id="status" class="text-sm text-slate-500"></span>
    </div>
    <div id="table" class="mt-5 overflow-x-auto"></div>
  </div>
  <script src="assets/admin-supply-pricing.js"></script>
</body>
</html>
