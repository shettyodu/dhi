<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Savings realization (internal) — DHI</title>
  <link rel="stylesheet" href="assets/tailwind.css" />
  <style>body{font-family:Inter,system-ui,sans-serif}.in{border-radius:.4rem;border:1px solid #cbd5e1;padding:.4rem .55rem;font-size:.85rem}td,th{padding:.45rem .55rem;border-bottom:1px solid #e2e8f0;text-align:left;font-size:.82rem}th{background:#f8fafc;color:#0a2540;font-weight:600}</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-8">
    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <a href="admin.html" class="text-xs font-semibold text-cyan-700 hover:underline">&larr; Leads admin</a>
        <h1 class="mt-1 font-display text-2xl font-extrabold text-brand-900">Savings realization &amp; gainshare</h1>
        <p class="text-sm text-slate-500">Internal ROI ledger. Record <b>identified</b> savings (from a benchmark) vs. <b>captured</b> savings (actually realized) per client, and the gainshare fee. Our billing/ROI record — aggregate figures only.</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="secret" type="password" class="in" placeholder="Admin key" />
        <button id="load" class="rounded-lg bg-brand-900 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-800">Load</button>
      </div>
    </div>

    <!-- Add entry -->
    <div class="mt-5 rounded-xl border border-slate-200 bg-white p-4">
      <p class="text-sm font-semibold text-brand-900">Record a savings entry</p>
      <div class="mt-3 grid gap-2 sm:grid-cols-6">
        <input id="e-tenant" class="in sm:col-span-2" placeholder="Client (e.g. Sentara Health)" list="tenants" />
        <datalist id="tenants"><option>Sentara Health</option><option>Vanderbilt University Medical Center</option><option>Mayo Clinic</option><option>WellLink</option></datalist>
        <input id="e-date" type="date" class="in" />
        <input id="e-identified" type="number" step="0.01" class="in" placeholder="Identified $" />
        <input id="e-captured" type="number" step="0.01" class="in" placeholder="Captured $" />
        <button id="add" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700">Add</button>
        <input id="e-note" class="in sm:col-span-6" placeholder="Note (optional) — e.g. gowns standardized across 3 departments" />
      </div>
      <p id="add-status" class="mt-2 text-xs text-slate-500"></p>
    </div>

    <div class="mt-4 flex flex-wrap items-center gap-3">
      <label class="text-sm text-slate-600">Gainshare %
        <input id="pct" type="number" step="1" value="25" class="in ml-1 w-20" />
      </label>
      <span id="status" class="text-sm text-slate-500"></span>
    </div>

    <div id="totals" class="mt-4 grid gap-3 sm:grid-cols-4"></div>
    <h2 class="mt-6 font-display text-base font-bold text-brand-900">By client</h2>
    <div id="rollup" class="mt-2 overflow-x-auto"></div>
    <h2 class="mt-6 font-display text-base font-bold text-brand-900">Entries</h2>
    <div id="entries" class="mt-2 overflow-x-auto"></div>
  </div>
  <script src="assets/admin-savings.js?v=1"></script>
</body>
</html>
