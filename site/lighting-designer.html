<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Your Space — Guided Lighting | DHI</title>
  <meta name="description" content="An immersive, guided lighting experience — tell us what you're lighting and walk through your space picking the right fixtures, powered by Keystone." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ["Inter","ui-sans-serif","system-ui","sans-serif"], display: ["Montserrat","Inter","sans-serif"] },
      colors: { brand: { 50:"#eef4fb",100:"#d9e6f5",200:"#b7cfe9",300:"#8bb0d8",400:"#5a8bc2",600:"#1d4e89",700:"#143c6c",800:"#0e3a5f",900:"#0a2540",950:"#071a30" } },
    } } };
  </script>
  <style>
    body{font-family:Inter,system-ui,sans-serif}
    .scene{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .8s ease}
    .scene.on{opacity:1}
    .kb{animation:kb 20s ease-out forwards}
    @keyframes kb{from{transform:scale(1.12)}to{transform:scale(1)}}
    .pop{opacity:0;transform:translateY(14px)}
    .pop.in{opacity:1;transform:none;transition:opacity .5s ease,transform .5s ease}
    .glow{transition:all .2s ease}
    .glow:hover{box-shadow:0 0 0 3px rgba(6,182,212,.25),0 12px 28px -6px rgba(8,47,73,.45)}
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</head>
<body class="bg-brand-950 text-white antialiased">
  <main id="designer" class="relative min-h-screen w-full overflow-hidden"></main>
  <!-- toast -->
  <div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 z-[80] -translate-x-1/2 opacity-0 transition-opacity duration-300"></div>

  <script src="assets/catalog-data.js"></script>
  <script src="assets/lighting-designer.js"></script>
</body>
</html>
