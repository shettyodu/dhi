<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — Digital Health International</title>
  <meta name="description" content="Your DHI buyer account — save quotes, reorder, and track your requests across lighting, supplies, and more." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/tailwind.css" />
  <style>body{font-family:Inter,system-ui,sans-serif}</style>

<body class="bg-slate-50 text-slate-700 antialiased">

  <section class="relative overflow-hidden bg-brand-950">
    <div class="absolute inset-0 bg-gradient-to-br from-brand-950 via-brand-900 to-brand-800"></div>
    <div class="relative mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-12 sm:py-14">
      <p class="kicker text-sm font-semibold uppercase tracking-wider text-cyan-300">DHI Buyer Account</p>
      <h1 class="mt-2 font-display text-3xl font-extrabold tracking-tight text-white sm:text-4xl">My account</h1>
      <p class="mt-3 max-w-2xl text-lg text-slate-300">Save quotes, reorder in one click, and keep your requests in one place — across lighting, supplies, and every DHI vertical.</p>
    </div>
  </section>

  <main class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-10">
    <div id="portal-root"><div class="rounded-2xl border border-slate-200 bg-white p-10 text-center text-slate-500"><div class="mx-auto h-8 w-8 animate-spin rounded-full border-2 border-slate-200 border-t-cyan-600"></div><p class="mt-3 text-sm">Loading your account…</p></div></div>
  </main>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="assets/components.js"></script>
  <script src="assets/portal.js?v=3"></script>
