# Deploy the WHOLE `website/` folder (this directory) to Netlify so ONE site
# serves both the static storefront (site/) and the payment functions
# (backend/netlify/functions). Same-origin = no CORS issues, and the endpoint
# already set in site/assets/checkout.js resolves on this same domain.

[build]
  command = "npm install"          # installs stripe + ethers + @netlify/blobs for the functions
  publish = "site"                 # the static storefront
  functions = "backend/netlify/functions"

[build.environment]
  NODE_VERSION = "20"              # ethers v6 / @netlify/blobs need Node >= 18

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/data/prices.json", "backend/data/lighting-index.json", "backend/data/supplies-index.json"]

# Daily refresh of the Government bid-opportunity cache (SAM.gov → Netlify Blobs).
[functions."gov-bids-refresh"]
  schedule = "@daily"

# Daily check of saved bid-alert searches → email new matches (Gmail; dormant
# until GMAIL_USER + GMAIL_APP_PASSWORD are set).
[functions."gov-bid-alerts-run"]
  schedule = "@daily"

# Keep the AutoCommand backend (Render free tier) warm. Hourly is plenty now that
# the primary inventory path is Auto.dev via Netlify functions (the Render backend
# is only a fallback) — cuts ~130+ idle invocations/day vs the old 10-min schedule.
[functions."automotive-keepalive"]
  schedule = "0 * * * *"

# Long-cache versioned/static assets so returning visitors stop re-downloading
# them (big bandwidth saving under traffic). JS is cache-busted via ?v=N and
# images rarely change; CSS/HTML are left on Netlify defaults so edits propagate.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS revalidates (cheap 304s) rather than immutable-caching: components.js is
# shared sitewide and loaded UNVERSIONED, so an immutable pin would serve stale
# nav/footer/verticals to returning visitors. Per-page bundles still cache-bust via ?v=N.
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
