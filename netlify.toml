# Deploy the WHOLE `website/` folder (this directory) to Netlify so ONE site
# serves both the static storefront (site/) and the payment functions
# (backend/netlify/functions). Same-origin = no CORS issues, and the endpoint
# already set in site/assets/checkout.js resolves on this same domain.

[build]
  command = "npm install"          # installs stripe + ethers + @netlify/blobs for the functions
  publish = "site"                 # the static storefront
  functions = "backend/netlify/functions"

[build.environment]
  NODE_VERSION = "20"              # ethers v6 / @netlify/blobs need Node >= 18

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/data/prices.json", "backend/data/lighting-index.json", "backend/data/lighting-suppliers.json", "backend/data/supplies-index.json"]

# Daily refresh of the Government bid-opportunity cache (SAM.gov → Netlify Blobs).
[functions."gov-bids-refresh"]
  schedule = "@daily"

# Daily check of saved bid-alert searches → email new matches (Gmail; dormant
# until GMAIL_USER + GMAIL_APP_PASSWORD are set).
[functions."gov-bid-alerts-run"]
  schedule = "@daily"

# Keep the AutoCommand backend (Render free tier) warm. Render free sleeps after
# ~15 min idle, so hourly let it cold-start and time out the first live search
# (reproduced in a go-live check). Ping every 10 min to keep it warm for demos.
# Real fix is a paid always-on tier; this is the stopgap.
[functions."automotive-keepalive"]
  schedule = "*/10 * * * *"

# Long-cache versioned/static assets so returning visitors stop re-downloading
# them (big bandwidth saving under traffic). JS is cache-busted via ?v=N and
# images rarely change; CSS/HTML are left on Netlify defaults so edits propagate.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS revalidates (cheap 304s) rather than immutable-caching: components.js is
# shared sitewide and loaded UNVERSIONED, so an immutable pin would serve stale
# nav/footer/verticals to returning visitors. Per-page bundles still cache-bust via ?v=N.
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security hardening headers, applied to all routes. CSP is intentionally pragmatic:
# the site uses inline <script> on several pages plus third-party tags (GTM, Stripe,
# Netlify Identity, Facebook, Cognifit) and Google Fonts, so 'unsafe-inline' is allowed
# for now. It still blocks external script/connect origins we don't list, framing,
# and base-uri hijacking. Tighten to nonces/hashes once inline scripts are externalized.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://js.stripe.com https://identity.netlify.com https://connect.facebook.net https://www.cognifit.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://courageous-fairy-0b2d3c.netlify.app https://*.google-analytics.com https://*.analytics.google.com https://www.facebook.com https://calendly.com; frame-src 'self' https://js.stripe.com https://www.cognifit.com https://www.googletagmanager.com https://calendly.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# Vertical-1 was rebranded from the CCG/Titan "decentralized software" concept to
# DHI AICORE (data centers). Preserve old inbound links / SEO with a 301.
[[redirects]]
  from = "/decentralized-software.html"
  to = "/aicore.html"
  status = 301
  force = true
