<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · AutoCommand</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050810;
      --surface:  #0f1626;
      --border:   rgba(255,255,255,0.08);
      --accent:   #3b82f6;     /* blue */
      --accent2:  #06b6d4;     /* cyan */
      --error:    #f5365c;
      --text:     #e8eaf0;
      --text2:    #a0a8be;
      --text3:    #5a6280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed; inset: -100px;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(59,130,246,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 70%, rgba(6,182,212,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .login-logo {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .logo-mark {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(59,130,246,0.4);
    }
    .login-logo h1 {
      font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .login-logo h1 span {
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo .tagline {
      font-size: 0.82rem; color: var(--text3);
      letter-spacing: 0.04em;
    }

    form { display: flex; flex-direction: column; gap: 16px; }

    .field-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
    }

    .input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 14px;
      font-family: inherit; font-size: 0.92rem;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .input::placeholder { color: var(--text3); }
    .input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(59,130,246,0.05);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 9px;
      border: none; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
      transition: transform 0.1s, box-shadow 0.15s;
      margin-top: 6px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover  { box-shadow: 0 6px 28px rgba(59,130,246,0.5); transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); }

    .error {
      background: rgba(245,54,92,0.1);
      border: 1px solid rgba(245,54,92,0.25);
      color: var(--error);
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text3);
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
        <path d="M3 17h2a2 2 0 0 1 2-2v-3h10v3a2 2 0 0 1 2 2h2"/>
        <path d="M5 17v2M19 17v2"/>
        <circle cx="7" cy="17" r="1.5" fill="#fff"/>
        <circle cx="17" cy="17" r="1.5" fill="#fff"/>
        <path d="M5 12l1.5-4.5A2 2 0 0 1 8.5 6h7a2 2 0 0 1 2 1.5L19 12"/>
      </svg>
    </div>
    <h1>Auto<span>Command</span></h1>
    <p class="tagline">AI Vehicle Marketplace</p>
  </div>

  {% if error %}
    <div class="error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
  {% endif %}

  <form method="POST" action="/login" autocomplete="off">
    <div>
      <div class="field-label">Username</div>
      <input class="input" type="text" name="username" placeholder="Enter username" required autofocus />
    </div>
    <div>
      <div class="field-label">Password</div>
      <input class="input" type="password" name="password" placeholder="Enter password" required />
    </div>
    <button class="btn" type="submit">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
      Sign in
    </button>
  </form>

  <div class="footer-note">Restricted access · Authorized testers only</div>
</div>

</body>
</html>
